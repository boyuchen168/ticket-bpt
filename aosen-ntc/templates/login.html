<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户登录 - Tennis Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-4 py-10">
    <section class="bg-white rounded-2xl shadow-sm p-6 space-y-5">
      <header class="space-y-1">
        <h1 class="text-xl font-semibold">手机号登录</h1>
        <p class="text-sm text-slate-500">输入手机号获取验证码，完成国网小程序登录并保存凭证。</p>
      </header>

      <div id="noticeBar" class="hidden rounded-lg px-4 py-2 text-sm"></div>

      <label class="space-y-1 block">
        <span class="text-sm text-slate-600">手机号</span>
        <input id="mobileInput" type="tel" inputmode="numeric" maxlength="11" placeholder="请输入 11 位手机号" class="w-full border rounded-lg px-3 py-2" />
      </label>

      <div class="flex items-center gap-2">
        <button id="sendCodeBtn" class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm">获取验证码</button>
        <span id="cooldownHint" class="text-xs text-slate-500"></span>
      </div>

      <div id="verifyBlock" class="hidden space-y-3">
        <label class="space-y-1 block">
          <span class="text-sm text-slate-600">验证码</span>
          <input id="codeInput" type="text" inputmode="numeric" maxlength="8" placeholder="请输入短信验证码" class="w-full border rounded-lg px-3 py-2" />
        </label>
        <button id="loginBtn" class="w-full px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm">登录并保存凭证</button>
      </div>

      <div id="successBlock" class="hidden rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 text-sm space-y-1">
        <div id="successText"></div>
        <a href="/" class="underline text-emerald-700">返回管理页</a>
      </div>
    </section>
  </main>

  <script>
    let countdownTimer = null;
    let cooldownSeconds = 0;

    function el(id) { return document.getElementById(id); }

    function showNotice(message, kind = "ok") {
      const bar = el("noticeBar");
      bar.textContent = message;
      bar.classList.remove(
        "hidden",
        "bg-emerald-50", "text-emerald-700", "border-emerald-200",
        "bg-rose-50", "text-rose-700", "border-rose-200",
        "bg-amber-50", "text-amber-700", "border-amber-200"
      );
      if (kind === "error") {
        bar.classList.add("bg-rose-50", "text-rose-700", "border", "border-rose-200");
      } else if (kind === "warn") {
        bar.classList.add("bg-amber-50", "text-amber-700", "border", "border-amber-200");
      } else {
        bar.classList.add("bg-emerald-50", "text-emerald-700", "border", "border-emerald-200");
      }
    }

    function setButtonLoading(button, loadingText, isLoading) {
      if (isLoading) {
        button.dataset.prevText = button.textContent;
        button.textContent = loadingText;
        button.disabled = true;
        button.classList.add("opacity-60", "cursor-not-allowed");
        return;
      }
      button.disabled = false;
      button.classList.remove("opacity-60", "cursor-not-allowed");
      if (button.dataset.prevText) button.textContent = button.dataset.prevText;
    }

    function validateMobile(mobile) {
      return /^1\d{10}$/.test(mobile);
    }

    function updateCooldownUI() {
      const btn = el("sendCodeBtn");
      if (cooldownSeconds > 0) {
        btn.disabled = true;
        btn.classList.add("opacity-60", "cursor-not-allowed");
        el("cooldownHint").textContent = `${cooldownSeconds}s 后可重发`;
      } else {
        btn.disabled = false;
        btn.classList.remove("opacity-60", "cursor-not-allowed");
        el("cooldownHint").textContent = "";
      }
    }

    function startCooldown(seconds) {
      cooldownSeconds = seconds;
      updateCooldownUI();
      if (countdownTimer) window.clearInterval(countdownTimer);
      countdownTimer = window.setInterval(() => {
        cooldownSeconds = Math.max(0, cooldownSeconds - 1);
        updateCooldownUI();
        if (cooldownSeconds === 0 && countdownTimer) {
          window.clearInterval(countdownTimer);
          countdownTimer = null;
        }
      }, 1000);
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const contentType = response.headers.get("content-type") || "";
      const payload = contentType.includes("application/json")
        ? await response.json()
        : { ok: false, error: await response.text() };

      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || `HTTP ${response.status}`);
      }
      return payload;
    }

    async function sendCode() {
      const mobile = el("mobileInput").value.trim();
      if (!validateMobile(mobile)) {
        throw new Error("请输入正确的 11 位手机号");
      }
      const data = await fetchJson("/api/auth/send-code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mobile }),
      });
      el("verifyBlock").classList.remove("hidden");
      if (data.warning) {
        showNotice(data.message, "warn");
      } else {
        showNotice("验证码已发送，请查收短信");
        startCooldown(60);
      }
    }

    async function verifyCode() {
      const mobile = el("mobileInput").value.trim();
      const code = el("codeInput").value.trim();
      if (!validateMobile(mobile)) {
        throw new Error("请输入正确的 11 位手机号");
      }
      if (!code) {
        throw new Error("请输入验证码");
      }

      const data = await fetchJson("/api/auth/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mobile, code }),
      });

      el("successBlock").classList.remove("hidden");
      el("successText").textContent = `登录成功，已保存 ${data.auth.mobile} 的用户凭证。`;
      showNotice("登录成功，凭证已写入 MongoDB");
    }

    el("sendCodeBtn").addEventListener("click", async () => {
      const btn = el("sendCodeBtn");
      setButtonLoading(btn, "发送中...", true);
      try {
        await sendCode();
      } catch (error) {
        showNotice(error.message || String(error), "error");
      } finally {
        setButtonLoading(btn, "发送中...", false);
        updateCooldownUI();
      }
    });

    el("loginBtn").addEventListener("click", async () => {
      const btn = el("loginBtn");
      setButtonLoading(btn, "登录中...", true);
      try {
        await verifyCode();
      } catch (error) {
        showNotice(error.message || String(error), "error");
      } finally {
        setButtonLoading(btn, "登录中...", false);
      }
    });
  </script>
</body>
</html>
